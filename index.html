<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Rádio Online</title>
  <style>
    body {
      background: #121212;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .player {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      text-align: center;
      width: 320px;
      transition: all 0.4s ease;
    }

    .player h2 {
      color: #fff;
      margin-bottom: 15px;
    }

    .artist-photo {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      object-fit: cover;
      margin-bottom: 15px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .artist-photo:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .controls button {
      background: #00c853;
      border: none;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .controls button:hover {
      background: #009624;
      transform: scale(1.05);
    }

    .volume {
      width: 100%;
      margin-bottom: 15px;
    }

    .volume label {
      color: #fff;
      display: block;
      margin-bottom: 5px;
    }

    .volume input[type="range"] {
      width: 100%;
      accent-color: #00c853;
      transition: accent-color 0.3s ease;
    }

    .volume input[type="range"]:hover {
      accent-color: #00e676;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .social-icons a img {
      width: 30px;
      height: 30px;
      transition: transform 0.3s ease;
    }

    .social-icons a img:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="player">
    <h2>Minha Rádio Online</h2>
    <img src="https://via.placeholder.com/100x100.png?text=Artista" alt="Artista" class="artist-photo">

    <audio id="radioPlayer">
      <source src="https://tu-stream-url.com/live.mp3" type="audio/mpeg">
    </audio>

    <div class="controls">
      <button onclick="playRadio()">▶ Play</button>
      <button onclick="pauseRadio()">⏸ Pause</button>
    </div>

    <div class="volume">
      <label for="vol">Volume</label>
      <input id="vol" type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
    </div>

    <div class="social-icons">
      <a href="https://facebook.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      </a>
      <a href="https://tiktok.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046122.png" alt="TikTok">
      </a>
      <a href="https://instagram.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
    </div>
  </div>

  <script>
    const player = document.getElementById("radioPlayer");

    function playRadio() {
      player.play();
    }

    function pauseRadio() {
      player.pause();
    }

    function setVolume(value) {
      player.volume = value;
    }
  </script>
</body>
</html>
