<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player Personalizado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('fundo.jpg') no-repeat center center fixed;
      background-size: cover;
      transition: background 2s ease; /* transição suave */
    }

    .player {
      width: 400px;
      margin: 50px auto;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 15px;
      color: #fff;
      text-align: center;
    }

    .artist-photo {
      width: 300px;
      height: 300px;
      border-radius: 20px; /* quadrada com cantos arredondados */
      transition: transform 0.5s ease;
    }

    .artist-photo:hover {
      transform: scale(1.05);
    }

    .listeners {
      margin: 15px 0;
      font-size: 18px;
    }

    .power-btn {
      margin: 10px 0;
      padding: 10px 20px;
      background: #e74c3c;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .power-btn.on {
      background: #2ecc71;
    }

    .datetime {
      margin-top: 15px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="player">
    <img src="artista.jpg" alt="Foto do Artista" class="artist-photo">
    <div class="listeners">👥 1.234 ouvintes</div>

    <button class="power-btn" id="powerBtn">Ligar</button>

    <div class="datetime" id="datetime"></div>
  </div>

  <script>
    // Botão ligar/desligar
    const powerBtn = document.getElementById('powerBtn');
    let ligado = false;

    powerBtn.addEventListener('click', () => {
      ligado = !ligado;
      if(ligado){
        powerBtn.textContent = "Desligar";
        powerBtn.classList.add("on");
      } else {
        powerBtn.textContent = "Ligar";
        powerBtn.classList.remove("on");
      }
    });

    // Hora e data em tempo real
    function atualizarDataHora(){
      const agora = new Date();
      const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const data = agora.toLocaleDateString('pt-BR', opcoes);
      const hora = agora.toLocaleTimeString('pt-BR');
      document.getElementById('datetime').textContent = data + " - " + hora;
    }

    setInterval(atualizarDataHora, 1000);
    atualizarDataHora();
  </script>
</body>
</html>
