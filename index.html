<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player Personalizado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://culturainglesamg.com.br/wp-content/uploads/2026/02/BLOG_26-150x150.png') no-repeat center center fixed;
      background-size: cover;
      transition: background 2s ease;
    }

    .player {
      width: 400px;
      margin: 50px auto;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 15px;
      color: #fff;
      text-align: center;
    }

    .artist-photo {
      width: 300px;
      height: 300px;
      border-radius: 20px;
      transition: transform 0.5s ease;
    }

    .artist-photo:hover {
      transform: scale(1.05);
    }

    .listeners {
      margin: 15px 0;
      font-size: 18px;
    }

    .power-btn {
      margin: 10px 0;
      padding: 10px 20px;
      background: #e74c3c;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .power-btn.on {
      background: #2ecc71;
    }

    .datetime {
      margin-top: 15px;
      font-size: 16px;
    }

    /* Quadro estilizado */
    .song-box {
      margin-top: 20px;
      padding: 15px;
      border: 3px solid transparent;
      border-radius: 15px;
      background: linear-gradient(135deg, rgba(0,0,255,0.3), rgba(255,255,255,0.1));
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      box-shadow: 0 0 20px rgba(0,150,255,0.8);
      animation: glow 2s infinite alternate;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Texto com brilho correndo */
    .song-text {
      background: linear-gradient(90deg, #fff, #0ff, #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 4s linear infinite;
    }

    /* Nota musical animada */
    .note {
      font-size: 28px;
      animation: spin 4s linear infinite;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px rgba(0,150,255,0.5); }
      to { box-shadow: 0 0 25px rgba(0,255,255,0.9); }
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="player">
    <img src="artista.jpg" alt="Foto do Artista" class="artist-photo">
    <div class="listeners">👥 1.234 ouvintes</div>

    <button class="power-btn" id="powerBtn">Ligar</button>

    <div class="datetime" id="datetime"></div>

    <!-- Quadro estilizado com texto e nota animada -->
    <div class="song-box">
      <span class="note">🎵</span>
      <span class="song-text" id="songBox">Tocando agora: Nome da Música</span>
    </div>
  </div>

  <script>
    // Botão ligar/desligar
    const powerBtn = document.getElementById('powerBtn');
    let ligado = false;

    powerBtn.addEventListener('click', () => {
      ligado = !ligado;
      if(ligado){
        powerBtn.textContent = "Desligar";
        powerBtn.classList.add("on");
      } else {
        powerBtn.textContent = "Ligar";
        powerBtn.classList.remove("on");
      }
    });

    // Hora e data em tempo real
    function atualizarDataHora(){
      const agora = new Date();
      const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const data = agora.toLocaleDateString('pt-BR', opcoes);
      const hora = agora.toLocaleTimeString('pt-BR');
      document.getElementById('datetime').textContent = data + " - " + hora;
    }

    setInterval(atualizarDataHora, 1000);
    atualizarDataHora();

    // Atualizar nome da música dinamicamente
    const songBox = document.getElementById('songBox');
    let musicaAtual = "Minha Música Favorita";
    songBox.textContent = "Tocando agora: " + musicaAtual;
  </script>
</body>
</html>
